<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>C++ 刷题 · 单题模式（含答题卡）</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js">
    </script>
    <style>
        :root {
            --primary: #4f6ef7;
            --primary-light: #e8ecff;
            --primary-dark: #3a56d4;
            --success: #2ecc71;
            --danger: #e74c3c;
            --gray-50: #f8f9fc;
            --gray-100: #f1f2f6;
            --gray-200: #e2e5ed;
            --gray-300: #c5c9d6;
            --gray-600: #6b7280;
            --gray-800: #2d3748;
            --gray-900: #1a202c;
            --shadow: 0 12px 40px rgba(79, 110, 247, 0.12);
            --radius: 16px;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--gray-50);
            color: var(--gray-900);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .app {
            width: 100%;
            max-width: 860px;
            background: #fff;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
            min-height: 560px;
            display: flex;
            flex-direction: column;
        }
        .app-header {
            padding: 20px 30px 14px;
            border-bottom: 1px solid var(--gray-200);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
        }
        .app-header h1 {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .app-header .stats {
            display: flex;
            gap: 16px;
            font-size: 14px;
            color: var(--gray-600);
        }
        .app-header .stats span {
            background: var(--gray-100);
            padding: 2px 12px;
            border-radius: 30px;
            font-weight: 500;
        }
        .app-header .stats .correct { color: var(--success); background: #eafaf1; }

        .upload-zone {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 50px 30px 60px;
            text-align: center;
            background: #fff;
        }
        .upload-zone .icon { font-size: 56px; margin-bottom: 16px; opacity: 0.7; }
        .upload-zone h2 { font-size: 22px; font-weight: 600; margin-bottom: 8px; color: var(--gray-800); }
        .upload-zone p { color: var(--gray-600); font-size: 15px; max-width: 400px; margin-bottom: 24px; }
        .upload-zone .btn-upload {
            display: inline-block;
            background: var(--primary);
            color: #fff;
            padding: 12px 36px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            border: none;
            box-shadow: 0 4px 14px rgba(79, 110, 247, 0.30);
            transition: var(--transition);
        }
        .upload-zone .btn-upload:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(79, 110, 247, 0.35);
        }
        .upload-zone .hint { margin-top: 18px; font-size: 13px; color: var(--gray-300); }
        .upload-zone.drag-over { background: var(--primary-light); border: 2px dashed var(--primary); border-radius: var(--radius); }

        .quiz-area {
            flex: 1;
            display: none;
            flex-direction: column;
            padding: 16px 30px 18px;
            background: #fff;
        }
        .quiz-area.active { display: flex; }

        .progress-wrap {
            width: 100%;
            height: 4px;
            background: var(--gray-200);
            border-radius: 4px;
            margin-bottom: 12px;
            overflow: hidden;
        }
        .progress-wrap .bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), #8b5cf6);
            border-radius: 4px;
            transition: width 0.35s ease;
            width: 0%;
        }

        /* ===== 答题卡 ===== */
        .answer-sheet {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            padding: 8px 0 12px;
            margin-bottom: 12px;
            border-bottom: 1px solid var(--gray-200);
            max-height: 120px;
            overflow-y: auto;
        }
        .answer-sheet .card-item {
            width: 32px;
            height: 32px;
            border-radius: 6px;
            background: var(--gray-200);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 600;
            color: var(--gray-600);
            cursor: pointer;
            transition: var(--transition);
            border: 2px solid transparent;
            user-select: none;
        }
        .answer-sheet .card-item:hover { transform: scale(1.05); }
        .answer-sheet .card-item.active {
            border-color: var(--primary);
            background: var(--primary-light);
            color: var(--primary);
        }
        .answer-sheet .card-item.correct {
            background: var(--success);
            color: #fff;
        }
        .answer-sheet .card-item.wrong {
            background: var(--danger);
            color: #fff;
        }
        .answer-sheet .card-item.answered {
            background: var(--gray-300);
            color: #fff;
        }

        .question-meta {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 10px;
            flex-wrap: wrap;
            gap: 6px;
        }
        .question-meta .qnum {
            font-size: 15px;
            font-weight: 600;
            color: var(--primary);
            background: var(--primary-light);
            padding: 2px 16px;
            border-radius: 30px;
        }
        .question-meta .qtype {
            font-size: 13px;
            color: var(--gray-600);
            background: var(--gray-100);
            padding: 2px 14px;
            border-radius: 30px;
        }

        .question-text {
            font-size: 17px;
            line-height: 1.7;
            margin-bottom: 18px;
            padding: 4px 0 2px;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .options { display: flex; flex-direction: column; gap: 10px; margin-bottom: 18px; }
        .options .opt {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 18px;
            border: 2px solid var(--gray-200);
            border-radius: 12px;
            cursor: pointer;
            transition: var(--transition);
            background: #fff;
            font-size: 15px;
            line-height: 1.5;
        }
        .options .opt:hover { border-color: var(--primary); background: var(--primary-light); }
        .options .opt .label { font-weight: 600; color: var(--gray-600); min-width: 24px; }
        .options .opt.selected { border-color: var(--primary); background: var(--primary-light); }
        .options .opt.correct { border-color: var(--success); background: #eafaf1; }
        .options .opt.correct .label { color: var(--success); }
        .options .opt.wrong { border-color: var(--danger); background: #fdedec; }
        .options .opt.wrong .label { color: var(--danger); }
        .options .opt.reveal-correct { border-color: var(--success); background: #eafaf1; }
        .options .opt.reveal-correct .label { color: var(--success); }
        .options .opt.disabled { cursor: default; opacity: 0.85; }
        .options .opt.disabled:hover { border-color: var(--gray-200); background: #fff; }

        .judge-group {
            display: flex;
            gap: 16px;
            margin-bottom: 18px;
            flex-wrap: wrap;
        }
        .judge-group .jbtn {
            flex: 1;
            min-width: 100px;
            padding: 14px 20px;
            border: 2px solid var(--gray-200);
            border-radius: 12px;
            text-align: center;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            background: #fff;
            color: var(--gray-600);
        }
        .judge-group .jbtn:hover { border-color: var(--primary); background: var(--primary-light); }
        .judge-group .jbtn.selected-true { border-color: var(--success); background: #eafaf1; color: var(--success); }
        .judge-group .jbtn.selected-false { border-color: var(--danger); background: #fdedec; color: var(--danger); }
        .judge-group .jbtn.reveal-true { border-color: var(--success); background: #eafaf1; color: var(--success); }
        .judge-group .jbtn.reveal-false { border-color: var(--danger); background: #fdedec; color: var(--danger); }
        .judge-group .jbtn.disabled { cursor: default; opacity: 0.85; }
        .judge-group .jbtn.disabled:hover { border-color: var(--gray-200); background: #fff; }

        .feedback {
            padding: 14px 18px;
            border-radius: 12px;
            margin-bottom: 14px;
            font-size: 15px;
            font-weight: 500;
            display: none;
            align-items: center;
            gap: 10px;
            background: var(--gray-100);
            color: var(--gray-800);
        }
        .feedback.show { display: flex; }
        .feedback.correct { background: #eafaf1; color: #1a7a3a; }
        .feedback.wrong { background: #fdedec; color: #b03a2e; }
        .feedback .ans { font-weight: 700; margin-left: auto; padding: 2px 14px; background: rgba(0,0,0,0.06); border-radius: 30px; }

        .action-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-top: 4px;
            padding-top: 14px;
            border-top: 1px solid var(--gray-200);
            flex-wrap: wrap;
        }
        .action-bar .nav-group { display: flex; gap: 8px; }
        .action-bar button {
            padding: 10px 22px;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: var(--transition);
            background: var(--gray-100);
            color: var(--gray-800);
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .action-bar button:hover:not(:disabled) { background: var(--gray-200); }
        .action-bar button:disabled { opacity: 0.4; cursor: not-allowed; }
        .action-bar .btn-primary { background: var(--primary); color: #fff; }
        .action-bar .btn-primary:hover:not(:disabled) { background: var(--primary-dark); }
        .action-bar .btn-outline { background: transparent; border: 2px solid var(--gray-200); }
        .action-bar .btn-outline:hover:not(:disabled) { border-color: var(--primary); color: var(--primary); }
        .action-bar .btn-danger { background: var(--danger); color: #fff; }
        .action-bar .btn-danger:hover:not(:disabled) { background: #c0392b; }

        @media (max-width: 640px) {
            .app-header { padding: 14px 16px 10px; }
            .app-header h1 { font-size: 17px; }
            .app-header .stats { font-size: 12px; gap: 8px; }
            .upload-zone { padding: 30px 18px 40px; }
            .upload-zone .icon { font-size: 40px; }
            .upload-zone h2 { font-size: 18px; }
            .quiz-area { padding: 12px 16px 12px; }
            .question-text { font-size: 15px; }
            .options .opt { padding: 10px 14px; font-size: 14px; }
            .action-bar { flex-direction: column; align-items: stretch; }
            .action-bar .nav-group { justify-content: center; }
            .action-bar button { justify-content: center; padding: 10px 16px; font-size: 13px; }
            .judge-group .jbtn { min-width: 70px; padding: 12px 10px; font-size: 14px; }
            .answer-sheet .card-item { width: 28px; height: 28px; font-size: 11px; }
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="app" id="app">
    <header class="app-header">
        <h1>📘 C++ 刷题 · 单题模式</h1>
        <div class="stats" id="statsDisplay">
            <span id="totalCount">📚 0 题</span>
            <span id="answeredCount">✅ 0 已答</span>
            <span id="correctCount" class="correct">✔️ 0 正确</span>
        </div>
    </header>

    <section class="upload-zone" id="uploadZone">
        <div class="icon">📂</div>
        <h2>上传 C++ 复习题文档</h2>
        <p>支持 <strong>.docx</strong> 格式，自动识别选择题 &amp; 判断题</p>
        <button class="btn-upload" id="uploadBtn">选择文件</button>
        <input type="file" id="fileInput" accept=".docx" style="display:none" />
        <div class="hint">或直接拖拽文件到此处</div>
    </section>

    <section class="quiz-area" id="quizArea">
        <div class="progress-wrap"><div class="bar" id="progressBar"></div></div>

        <!-- 答题卡 -->
        <div class="answer-sheet" id="answerSheet"></div>

        <div class="question-meta">
            <span class="qnum" id="qnumLabel">第 1 题</span>
            <span class="qtype" id="qtypeLabel">选择题</span>
        </div>
        <div class="question-text" id="questionText"></div>
        <div class="options" id="optionsContainer"></div>
        <div class="judge-group" id="judgeContainer"></div>
        <div class="feedback" id="feedback">
            <span id="feedbackIcon">✅</span>
            <span id="feedbackText"></span>
            <span class="ans" id="feedbackAnswer"></span>
        </div>
        <div class="action-bar">
            <div class="nav-group">
                <button id="prevBtn" disabled>◀ 上一题</button>
                <button id="nextBtn">下一题 ▶</button>
            </div>
            <div style="display:flex; gap:8px; flex-wrap:wrap;">
                <button class="btn-primary" id="revealBtn">💡 显示答案</button>
                <button class="btn-danger" id="resetBtn">🔄 重置进度</button>
            </div>
        </div>
    </section>
</div>

<script>
    // ========== 数据 ==========
    let questions = [];
    let currentIndex = 0;
    let revealed = false;

    const $ = id => document.getElementById(id);
    const uploadZone = $('uploadZone');
    const quizArea = $('quizArea');
    const fileInput = $('fileInput');
    const uploadBtn = $('uploadBtn');
    const totalCount = $('totalCount');
    const answeredCount = $('answeredCount');
    const correctCount = $('correctCount');
    const progressBar = $('progressBar');
    const answerSheet = $('answerSheet');
    const qnumLabel = $('qnumLabel');
    const qtypeLabel = $('qtypeLabel');
    const questionText = $('questionText');
    const optionsContainer = $('optionsContainer');
    const judgeContainer = $('judgeContainer');
    const feedback = $('feedback');
    const feedbackIcon = $('feedbackIcon');
    const feedbackText = $('feedbackText');
    const feedbackAnswer = $('feedbackAnswer');
    const prevBtn = $('prevBtn');
    const nextBtn = $('nextBtn');
    const revealBtn = $('revealBtn');
    const resetBtn = $('resetBtn');

    // ============================================================
    // 核心解析器 —— 稳健识别选择题/判断题
    // ============================================================
    function parseQuestions(text) {
        const lines = text.split(/\r?\n/);
        const result = [];
        let i = 0;
        const total = lines.length;

        while (i < total) {
            let line = lines[i].trim();
            if (!line) { i++; continue; }

            const match = line.match(/^(\d+)[\.、\s]+/);
            if (!match) { i++; continue; }

            const id = parseInt(match[1], 10);
            let content = line.replace(/^\d+[\.、\s]+/, '').trim();
            let options = [];
            let answer = '';
            let type = 'choice';

            let contentLines = [content];
            let j = i + 1;
            while (j < total) {
                const nextLine = lines[j].trim();
                if (/^\d+[\.、\s]/.test(nextLine)) break;
                if (/^答案[：:]\s*/.test(nextLine)) {
                    const ansMatch = nextLine.match(/^答案[：:]\s*(.+)/);
                    if (ansMatch) answer = ansMatch[1].trim();
                    j++;
                    break;
                }
                if (nextLine) contentLines.push(nextLine);
                j++;
            }
            let fullContent = contentLines.join('\n');

            // ---- 提取选项（多级策略） ----
            function extractOptions(text) {
                // 策略1：直接匹配 “A、xxx；B、xxx；C、xxx；D、xxx” 允许分号或空格
                // 使用更通用的正则：匹配 A、... B、... C、... D、...
                const regex = /A[、\.\)\:：]\s*([^；;]*?)\s*[；;]?\s*B[、\.\)\:：]\s*([^；;]*?)\s*[；;]?\s*C[、\.\)\:：]\s*([^；;]*?)\s*[；;]?\s*D[、\.\)\:：]\s*([^；;]*?)\s*(?:[；;]|$)/i;
                const m = text.match(regex);
                if (m) {
                    const texts = [m[1].trim(), m[2].trim(), m[3].trim(), m[4].trim()];
                    if (texts.every(t => t.length > 0)) {
                        return texts.map((t, idx) => ({ label: 'ABCD'[idx], text: t }));
                    }
                }

                // 策略2：按分号或换行分割，逐个匹配
                const separators = /[；;]|\n/;
                const parts = text.split(separators).filter(p => p.trim().length > 0);
                let opts = [];
                for (const p of parts) {
                    const m2 = p.trim().match(/^([A-D])[、\.\)\:：]\s*(.*)/);
                    if (m2) {
                        opts.push({ label: m2[1], text: m2[2].trim() });
                    }
                }
                if (opts.length === 4) return opts;

                // 策略3：全局搜索每个选项字母及其后续内容
                const regex3 = /([A-D])[、\.\)\:：]\s*([^；;]*?)(?=\s*[；;]|\s*[A-D][、\.\)\:：]|$)/g;
                let m3, opts3 = [];
                while ((m3 = regex3.exec(text)) !== null) {
                    const label = m3[1];
                    const txt = m3[2].trim();
                    if (txt) opts3.push({ label, text: txt });
                }
                if (opts3.length === 4) return opts3;

                // 策略4：尝试将内容按常见分隔符分割后，取前4个以A-D开头的块
                const splitRegex = /[；;、，\s]+/;
                const tokens = text.split(splitRegex).filter(t => t.length > 0);
                let opts4 = [];
                for (const tk of tokens) {
                    const m4 = tk.match(/^([A-D])[、\.\)\:：]?(.*)/);
                    if (m4) {
                        opts4.push({ label: m4[1], text: m4[2].trim() || '选项' });
                    }
                }
                if (opts4.length === 4) return opts4;

                return null;
            }

            const extracted = extractOptions(fullContent);
            if (extracted) {
                options = extracted;
                type = 'choice';
                // 清理题干：移除选项部分
                let pure = fullContent;
                for (const opt of options) {
                    const regex = new RegExp(`[${opt.label}][、\.\)\:：]\\s*${opt.text.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')}`, 'g');
                    pure = pure.replace(regex, '');
                }
                pure = pure.replace(/[；;]\s*/g, '').replace(/\n{2,}/g, '\n').trim();
                content = pure || fullContent.replace(/[；;]\s*/g, '').trim();
            } else {
                // 没有提取到4个选项，判断是否为判断题
                const isJudge = (answer === '对' || answer === '错' || answer === '√' || answer === '×');
                if (isJudge) {
                    type = 'judge';
                    if (answer === '√') answer = '对';
                    if (answer === '×') answer = '错';
                    content = fullContent.trim();
                } else {
                    // 尝试从内容中推断
                    if (/正确|对/.test(fullContent) && !/错误|错/.test(fullContent)) {
                        type = 'judge';
                        answer = '对';
                        content = fullContent.trim();
                    } else if (/错误|错/.test(fullContent) && !/正确|对/.test(fullContent)) {
                        type = 'judge';
                        answer = '错';
                        content = fullContent.trim();
                    } else {
                        // 默认作为选择题，填充默认选项
                        type = 'choice';
                        options = [
                            { label: 'A', text: '选项 A' },
                            { label: 'B', text: '选项 B' },
                            { label: 'C', text: '选项 C' },
                            { label: 'D', text: '选项 D' }
                        ];
                        content = fullContent.trim();
                        if (!/^[A-D]$/.test(answer)) {
                            const ansInText = fullContent.match(/答案[：:]\s*([A-D])/);
                            answer = ansInText ? ansInText[1] : 'A';
                        }
                    }
                }
            }

            // ---- 提取答案（只取首字符） ----
            if (answer) {
                const clean = answer.match(/^([A-D对错√×])/);
                if (clean) {
                    answer = clean[1];
                    if (answer === '√') answer = '对';
                    if (answer === '×') answer = '错';
                } else {
                    // 尝试从内容中再找
                    const ansInText = fullContent.match(/答案[：:]\s*([A-D对错√×])/);
                    if (ansInText) {
                        answer = ansInText[1];
                        if (answer === '√') answer = '对';
                        if (answer === '×') answer = '错';
                    } else {
                        answer = (type === 'choice') ? 'A' : '对';
                    }
                }
            } else {
                const ansInText = fullContent.match(/答案[：:]\s*([A-D对错√×])/);
                if (ansInText) {
                    answer = ansInText[1];
                    if (answer === '√') answer = '对';
                    if (answer === '×') answer = '错';
                } else {
                    answer = (type === 'choice') ? 'A' : '对';
                }
            }

            // 若选择题答案意外为对/错，强制改为A
            if (type === 'choice' && (answer === '对' || answer === '错')) {
                answer = 'A';
            }

            result.push({
                id,
                type,
                text: content || '（题目内容为空）',
                options: options,
                answer: answer,
                userAnswer: null,
                isCorrect: null,
            });

            i = j;
        }

        // 去重排序
        const seen = new Set();
        const unique = [];
        for (const q of result) {
            if (!seen.has(q.id)) {
                seen.add(q.id);
                unique.push(q);
            }
        }
        unique.sort((a, b) => a.id - b.id);
        return unique;
    }

    // ========== 渲染 ==========
    function updateStats() {
        const total = questions.length;
        const answered = questions.filter(q => q.userAnswer !== null).length;
        const correct = questions.filter(q => q.isCorrect === true).length;
        totalCount.textContent = `📚 ${total} 题`;
        answeredCount.textContent = `✅ ${answered} 已答`;
        correctCount.textContent = `✔️ ${correct} 正确`;
    }

    function renderAnswerSheet() {
        answerSheet.innerHTML = '';
        questions.forEach((q, idx) => {
            const div = document.createElement('div');
            div.className = 'card-item';
            if (idx === currentIndex) div.classList.add('active');
            if (q.userAnswer !== null) {
                if (q.isCorrect === true) div.classList.add('correct');
                else if (q.isCorrect === false) div.classList.add('wrong');
                else div.classList.add('answered');
            }
            div.textContent = q.id || idx + 1;
            div.dataset.index = idx;
            div.addEventListener('click', () => {
                if (idx !== currentIndex) {
                    currentIndex = idx;
                    renderQuestion();
                }
            });
            answerSheet.appendChild(div);
        });
    }

    function renderQuestion() {
        if (!questions.length) return;
        const q = questions[currentIndex];
        if (!q) return;

        const total = questions.length;
        progressBar.style.width = ((currentIndex + 1) / total * 100) + '%';
        qnumLabel.textContent = `第 ${q.id || currentIndex + 1} 题`;
        qtypeLabel.textContent = q.type === 'choice' ? '选择题' : '判断题';
        questionText.textContent = q.text;

        feedback.classList.remove('show', 'correct', 'wrong');
        feedbackText.textContent = '';
        revealed = false;

        if (q.type === 'choice') {
            optionsContainer.style.display = 'flex';
            judgeContainer.style.display = 'none';
            optionsContainer.innerHTML = '';
            const labels = ['A', 'B', 'C', 'D'];
            for (let i = 0; i < 4; i++) {
                const opt = q.options[i] || { label: labels[i], text: '选项' + labels[i] };
                const div = document.createElement('div');
                div.className = 'opt';
                if (q.userAnswer === opt.label) div.classList.add('selected');
                div.dataset.label = opt.label;
                div.innerHTML = `<span class="label">${opt.label}.</span><span>${opt.text}</span>`;
                div.addEventListener('click', () => onOptionClick(opt.label));
                optionsContainer.appendChild(div);
            }
        } else {
            optionsContainer.style.display = 'none';
            judgeContainer.style.display = 'flex';
            judgeContainer.innerHTML = '';
            const trueBtn = document.createElement('button');
            trueBtn.className = 'jbtn';
            if (q.userAnswer === '对') trueBtn.classList.add('selected-true');
            trueBtn.textContent = '✅ 对';
            trueBtn.dataset.value = '对';
            trueBtn.addEventListener('click', () => onJudgeClick('对'));

            const falseBtn = document.createElement('button');
            falseBtn.className = 'jbtn';
            if (q.userAnswer === '错') falseBtn.classList.add('selected-false');
            falseBtn.textContent = '❌ 错';
            falseBtn.dataset.value = '错';
            falseBtn.addEventListener('click', () => onJudgeClick('错'));

            judgeContainer.appendChild(trueBtn);
            judgeContainer.appendChild(falseBtn);
        }

        prevBtn.disabled = currentIndex === 0;
        nextBtn.disabled = currentIndex === total - 1;
        nextBtn.textContent = currentIndex === total - 1 ? '完成 🎉' : '下一题 ▶';

        if (q.userAnswer) revealAnswer();
        updateStats();
        renderAnswerSheet();
    }

    // ========== 交互 ==========
    function onOptionClick(label) {
        if (revealed) return;
        const q = questions[currentIndex];
        if (!q || q.type !== 'choice') return;
        q.userAnswer = label;
        q.isCorrect = (label === q.answer);
        renderQuestion();
        revealAnswer();
    }

    function onJudgeClick(value) {
        if (revealed) return;
        const q = questions[currentIndex];
        if (!q || q.type !== 'judge') return;
        q.userAnswer = value;
        q.isCorrect = (value === q.answer);
        renderQuestion();
        revealAnswer();
    }

    function revealAnswer() {
        const q = questions[currentIndex];
        if (!q) return;
        if (!q.userAnswer) {
            feedback.classList.add('show');
            feedback.className = 'feedback show';
            feedbackIcon.textContent = '💡';
            feedbackText.textContent = '请先选择一个答案';
            feedbackAnswer.textContent = '';
            return;
        }
        revealed = true;
        const isCorrect = q.isCorrect;

        if (q.type === 'choice') {
            const items = optionsContainer.querySelectorAll('.opt');
            items.forEach(el => {
                el.classList.add('disabled');
                const label = el.dataset.label;
                if (label === q.answer) el.classList.add('reveal-correct');
                if (label === q.userAnswer && !isCorrect) el.classList.add('wrong');
                if (label === q.userAnswer && isCorrect) el.classList.add('correct');
            });
        } else {
            const btns = judgeContainer.querySelectorAll('.jbtn');
            btns.forEach(el => {
                el.classList.add('disabled');
                const val = el.dataset.value;
                if (val === q.answer) el.classList.add('reveal-true');
                if (val === q.userAnswer && !isCorrect) el.classList.add('selected-false');
                if (val === q.userAnswer && isCorrect) el.classList.add('selected-true');
            });
        }

        feedback.classList.add('show');
        feedback.className = 'feedback show ' + (isCorrect ? 'correct' : 'wrong');
        feedbackIcon.textContent = isCorrect ? '✅' : '❌';
        feedbackText.textContent = isCorrect ? '回答正确！' : '回答错误';
        feedbackAnswer.textContent = `正确答案：${q.answer}`;
        updateStats();
        renderAnswerSheet();
    }

    function goToPrev() {
        if (currentIndex > 0) { currentIndex--; renderQuestion(); }
    }
    function goToNext() {
        if (currentIndex < questions.length - 1) { currentIndex++; renderQuestion(); }
        else if (questions.length) alert('🎉 恭喜你完成所有题目！');
    }

    function resetProgress() {
        if (!questions.length) return;
        if (!confirm('确定要重置所有答题进度吗？')) return;
        for (const q of questions) {
            q.userAnswer = null;
            q.isCorrect = null;
        }
        currentIndex = 0;
        renderQuestion();
    }

    // ========== 文件上传 ==========
    function handleFile(file) {
        if (!file) return;
        if (!file.name.endsWith('.docx')) {
            alert('请上传 .docx 格式的文件');
            return;
        }
        const reader = new FileReader();
        reader.onload = function(e) {
            mammoth.extractRawText({ arrayBuffer: e.target.result })
                .then(result => {
                    const text = result.value;
                    if (!text || text.trim().length < 10) {
                        alert('文档内容为空或无法识别，请检查文件');
                        return;
                    }
                    const parsed = parseQuestions(text);
                    if (parsed.length === 0) {
                        alert('未能从文档中识别出题目，请确认格式是否正确');
                        return;
                    }
                    questions = parsed;
                    currentIndex = 0;
                    uploadZone.style.display = 'none';
                    quizArea.classList.add('active');
                    renderQuestion();
                })
                .catch(err => {
                    console.error(err);
                    alert('解析文档失败，请确保文件格式正确');
                });
        };
        reader.readAsArrayBuffer(file);
    }

    // ========== 事件绑定 ==========
    uploadBtn.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', (e) => {
        if (e.target.files.length) handleFile(e.target.files[0]);
        fileInput.value = '';
    });
    uploadZone.addEventListener('dragover', (e) => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
    uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
    uploadZone.addEventListener('drop', (e) => {
        e.preventDefault();
        uploadZone.classList.remove('drag-over');
        if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
    });

    prevBtn.addEventListener('click', goToPrev);
    nextBtn.addEventListener('click', goToNext);
    revealBtn.addEventListener('click', revealAnswer);
    resetBtn.addEventListener('click', resetProgress);

    document.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowLeft') goToPrev();
        if (e.key === 'ArrowRight') goToNext();
        if (e.key === 'Enter' && !e.shiftKey) revealAnswer();
        if (e.key === 'r' || e.key === 'R') resetProgress();
    });

    console.log('📘 C++ 刷题工具已加载（含答题卡）');
</script>
</body>
</html>
