<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>汇编语言 · 刷题系统 · 完善版</title>
    <style>
        /* ===== 全局重置 & 主题 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', 'PingFang SC', Roboto, system-ui, sans-serif;
            background: #f0f4f8;
            color: #1a2332;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .app {
            width: 100%;
            max-width: 920px;
            background: #ffffff;
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            overflow: hidden;
            transition: all 0.2s;
        }

        /* ===== 头部 ===== */
        .header {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            padding: 18px 28px 14px 28px;
            color: #f1f5f9;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #334155;
        }
        .header h1 {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 0.3px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .header h1 small {
            font-size: 14px;
            font-weight: 400;
            color: #94a3b8;
            margin-left: 6px;
        }
        .stats {
            display: flex;
            gap: 18px;
            font-size: 14px;
            background: rgba(255, 255, 255, 0.07);
            padding: 6px 16px;
            border-radius: 40px;
            flex-wrap: wrap;
        }
        .stats span {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .stats .num {
            font-weight: 700;
            color: #facc15;
            min-width: 28px;
            text-align: center;
        }

        /* ===== 标签栏 ===== */
        .tabs {
            display: flex;
            background: #f8fafc;
            border-bottom: 1px solid #e2e8f0;
            padding: 0 20px;
            gap: 4px;
            flex-wrap: wrap;
        }
        .tabs button {
            background: transparent;
            border: none;
            padding: 14px 18px 12px 18px;
            font-size: 15px;
            font-weight: 600;
            color: #64748b;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: 0.15s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .tabs button:hover {
            color: #1e293b;
            background: rgba(0, 0, 0, 0.03);
        }
        .tabs button.active {
            color: #0f172a;
            border-bottom-color: #3b82f6;
            background: transparent;
        }
        .tabs button .badge {
            background: #e2e8f0;
            color: #334155;
            font-size: 11px;
            border-radius: 20px;
            padding: 0 10px;
            line-height: 20px;
            font-weight: 600;
        }
        .tabs button.active .badge {
            background: #3b82f6;
            color: #fff;
        }

        /* ===== 主内容 ===== */
        .main {
            padding: 24px 28px 20px 28px;
            min-height: 420px;
        }

        /* ===== 导入面板 ===== */
        .import-panel {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .import-panel textarea {
            width: 100%;
            min-height: 260px;
            padding: 16px;
            border: 2px solid #d1d9e6;
            border-radius: 16px;
            font-size: 14px;
            font-family: 'JetBrains Mono', 'Consolas', monospace;
            background: #fafcff;
            resize: vertical;
            transition: 0.2s;
            line-height: 1.7;
        }
        .import-panel textarea:focus {
            border-color: #3b82f6;
            outline: none;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
        }
        .import-actions {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
            align-items: center;
        }
        .btn {
            padding: 10px 28px;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-primary {
            background: #1e293b;
            color: #fff;
        }
        .btn-primary:hover {
            background: #0f172a;
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(15, 23, 42, 0.25);
        }
        .btn-success {
            background: #059669;
            color: #fff;
        }
        .btn-success:hover {
            background: #047857;
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(5, 150, 105, 0.25);
        }
        .btn-outline {
            background: transparent;
            border: 2px solid #cbd5e1;
            color: #334155;
        }
        .btn-outline:hover {
            border-color: #94a3b8;
            background: #f1f5f9;
        }
        .btn-danger {
            background: #dc2626;
            color: #fff;
        }
        .btn-danger:hover {
            background: #b91c1c;
        }
        .btn-sm {
            padding: 6px 16px;
            font-size: 13px;
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }
        .import-info {
            font-size: 14px;
            color: #475569;
            background: #f1f5f9;
            padding: 12px 18px;
            border-radius: 12px;
            border-left: 4px solid #3b82f6;
        }
        .import-info strong {
            color: #0f172a;
        }

        /* ===== 刷题面板 ===== */
        .quiz-panel {
            display: none;
            flex-direction: column;
            gap: 18px;
        }
        .quiz-panel.active {
            display: flex;
        }

        .progress-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            color: #475569;
            gap: 12px;
            flex-wrap: wrap;
        }
        .progress-bar {
            flex: 1;
            min-width: 120px;
            height: 6px;
            background: #e2e8f0;
            border-radius: 10px;
            overflow: hidden;
        }
        .progress-bar .fill {
            height: 100%;
            background: linear-gradient(90deg, #3b82f6, #8b5cf6);
            border-radius: 10px;
            transition: width 0.3s ease;
            width: 0%;
        }
        /* 跳转控件 */
        .goto-container {
            display: flex;
            align-items: center;
            gap: 4px;
            background: #f1f5f9;
            padding: 2px 6px 2px 12px;
            border-radius: 40px;
        }
        .goto-container input {
            width: 60px;
            padding: 4px 6px;
            border: 1px solid #d1d9e6;
            border-radius: 30px;
            font-size: 13px;
            text-align: center;
            background: white;
            outline: none;
            transition: 0.15s;
        }
        .goto-container input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }
        .goto-container .goto-btn {
            background: transparent;
            border: none;
            padding: 4px 10px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 13px;
            color: #3b82f6;
            cursor: pointer;
            transition: 0.15s;
        }
        .goto-container .goto-btn:hover {
            background: rgba(59, 130, 246, 0.1);
        }

        .q-meta {
            display: flex;
            gap: 12px;
            font-size: 13px;
            color: #64748b;
            flex-wrap: wrap;
            align-items: center;
        }
        .q-meta .tag {
            background: #e2e8f0;
            padding: 2px 12px;
            border-radius: 20px;
            font-weight: 500;
            font-size: 12px;
        }
        .q-meta .tag.correct {
            background: #d1fae5;
            color: #065f46;
        }
        .q-meta .tag.wrong {
            background: #fee2e2;
            color: #991b1b;
        }
        .q-meta .tag.fav {
            background: #fef3c7;
            color: #92400e;
        }

        /* 题型筛选按钮组 */
        .type-filter {
            display: flex;
            gap: 4px;
            background: #f1f5f9;
            border-radius: 40px;
            padding: 4px;
        }
        .type-filter button {
            background: transparent;
            border: none;
            padding: 4px 14px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 600;
            color: #64748b;
            cursor: pointer;
            transition: 0.15s;
            white-space: nowrap;
        }
        .type-filter button:hover {
            color: #1e293b;
        }
        .type-filter button.active {
            background: #ffffff;
            color: #0f172a;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .question-text {
            font-size: 18px;
            line-height: 1.7;
            font-weight: 500;
            padding: 8px 0 4px 0;
            color: #0f172a;
        }
        .question-text .qid {
            color: #64748b;
            font-weight: 400;
            margin-right: 8px;
        }
        .question-text .empty-hint {
            color: #94a3b8;
            font-weight: 400;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin: 8px 0 4px 0;
        }
        .option {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 18px;
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            border-radius: 14px;
            cursor: pointer;
            transition: 0.15s;
            font-size: 16px;
        }
        .option:hover {
            background: #f1f5f9;
            border-color: #cbd5e1;
        }
        .option .label {
            font-weight: 600;
            color: #475569;
            min-width: 28px;
        }
        .option.selected {
            border-color: #3b82f6;
            background: #eff6ff;
        }
        .option.correct-reveal {
            border-color: #059669;
            background: #ecfdf5;
        }
        .option.correct-reveal .label {
            color: #059669;
        }
        .option.wrong-reveal {
            border-color: #dc2626;
            background: #fef2f2;
        }
        .option.wrong-reveal .label {
            color: #dc2626;
        }
        .option.disabled {
            cursor: default;
            opacity: 0.8;
        }
        .option input[type="radio"] {
            display: none;
        }

        .judge-options {
            display: flex;
            gap: 20px;
            margin: 8px 0 4px 0;
            flex-wrap: wrap;
        }
        .judge-options .option {
            flex: 0 1 160px;
            justify-content: center;
            font-weight: 600;
        }

        .answer-reveal {
            margin: 12px 0 6px 0;
            padding: 14px 20px;
            border-radius: 14px;
            font-size: 15px;
            display: none;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .answer-reveal.show {
            display: flex;
        }
        .answer-reveal.correct {
            background: #ecfdf5;
            border: 1px solid #a7f3d0;
            color: #065f46;
        }
        .answer-reveal.wrong {
            background: #fef2f2;
            border: 1px solid #fca5a5;
            color: #991b1b;
        }
        .answer-reveal .ans-text {
            font-weight: 700;
        }

        .actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 10px;
            padding-top: 16px;
            border-top: 1px solid #e2e8f0;
        }
        .actions .spacer {
            flex: 1;
        }
        .shortcuts-hint {
            font-size: 12px;
            color: #94a3b8;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 6px;
        }
        .shortcuts-hint kbd {
            background: #e2e8f0;
            padding: 0 6px;
            border-radius: 4px;
            font-family: inherit;
            font-weight: 600;
            color: #334155;
        }

        /* ===== 统计面板 ===== */
        .stats-panel {
            display: none;
            flex-direction: column;
            gap: 20px;
        }
        .stats-panel.active {
            display: flex;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 14px;
        }
        .stat-card {
            background: #f8fafc;
            padding: 16px 18px;
            border-radius: 16px;
            text-align: center;
            border: 1px solid #e2e8f0;
        }
        .stat-card .num {
            font-size: 28px;
            font-weight: 700;
            color: #0f172a;
        }
        .stat-card .label {
            font-size: 13px;
            color: #64748b;
            margin-top: 4px;
        }
        .stat-card .num.gold {
            color: #d97706;
        }
        .stat-card .num.green {
            color: #059669;
        }
        .stat-card .num.red {
            color: #dc2626;
        }
        .stat-card .num.blue {
            color: #3b82f6;
        }

        .detail-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 14px;
            background: #f8fafc;
            padding: 16px 20px;
            border-radius: 16px;
            border: 1px solid #e2e8f0;
        }
        .detail-stats .item {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            padding: 4px 0;
            border-bottom: 1px dashed #e2e8f0;
        }
        .detail-stats .item:last-child {
            border-bottom: none;
        }
        .detail-stats .item .val {
            font-weight: 700;
        }

        .wrong-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 400px;
            overflow-y: auto;
            padding-right: 4px;
        }
        .wrong-item {
            background: #fef2f2;
            border-left: 4px solid #dc2626;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }
        .wrong-item .q {
            flex: 1;
            min-width: 160px;
        }
        .wrong-item .info {
            font-size: 13px;
            color: #64748b;
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        /* ===== 空状态 ===== */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #94a3b8;
        }
        .empty-state .icon {
            font-size: 56px;
            margin-bottom: 16px;
        }
        .empty-state h3 {
            color: #334155;
            font-weight: 600;
        }

        /* ===== 响应式 ===== */
        @media (max-width: 640px) {
            .app {
                border-radius: 20px;
            }
            .header {
                padding: 16px 18px 12px 18px;
                flex-direction: column;
                align-items: stretch;
                gap: 10px;
            }
            .header h1 {
                font-size: 18px;
                justify-content: center;
            }
            .stats {
                justify-content: center;
                font-size: 13px;
                padding: 4px 12px;
            }
            .tabs {
                padding: 0 12px;
                gap: 2px;
            }
            .tabs button {
                font-size: 13px;
                padding: 10px 12px;
            }
            .main {
                padding: 16px 16px 14px 16px;
            }
            .question-text {
                font-size: 16px;
            }
            .option {
                font-size: 14px;
                padding: 10px 14px;
            }
            .actions .btn {
                font-size: 13px;
                padding: 8px 16px;
            }
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .import-panel textarea {
                min-height: 180px;
            }
            .progress-row {
                flex-direction: column;
                align-items: stretch;
                gap: 6px;
            }
            .type-filter {
                align-self: center;
            }
            .shortcuts-hint {
                font-size: 11px;
            }
            .goto-container {
                align-self: center;
            }
            .goto-container input {
                width: 50px;
            }
        }

        /* ===== 滚动条 ===== */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f5f9;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        /* ===== 工具类 ===== */
        .hidden {
            display: none !important;
        }
        .text-center {
            text-align: center;
        }
        .mt-8 {
            margin-top: 8px;
        }
        .gap-8 {
            gap: 8px;
        }
        .flex-wrap {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
        }
    </style>
</head>
<body>

    <div class="app" id="app">
        <!-- 头部 -->
        <div class="header">
            <h1>
                📘 汇编刷题
                <small>8086/8088</small>
            </h1>
            <div class="stats" id="headerStats">
                <span>📝 <span class="num" id="totalCount">0</span></span>
                <span>✅ <span class="num" id="doneCount">0</span></span>
                <span>🎯 <span class="num" id="rightCount">0</span></span>
                <span>❌ <span class="num" id="wrongCount">0</span></span>
            </div>
        </div>

        <!-- 标签 -->
        <div class="tabs" id="tabBar">
            <button class="active" data-tab="import">📥 导入题库</button>
            <button data-tab="quiz" id="tabQuiz">📖 刷题 <span class="badge" id="quizBadge">0</span></button>
            <button data-tab="stats">📊 统计</button>
        </div>

        <!-- 主内容 -->
        <div class="main">

            <!-- ===== 导入面板 ===== -->
            <div class="import-panel" id="panelImport">
                <div class="import-info">
                    <strong>📌 使用说明：</strong> 粘贴题目文本（含参考答案），点击解析导入。
                    支持选择题（A/B/C/D）和判断题（正确/错误）。也可以直接导入 <strong>.txt</strong> 文件。
                </div>
                <textarea id="inputText" placeholder="粘贴题目文本…">2021 汇编复习（压缩版-带参考答案）
                    1. 在下列的选项中，能够组成计算机系统的是（  ）。
                    A）硬件系统和软件系统
                    B）CPU、存储器、输入/输出设备
                    C）操作系统、各种语言
                    D）系统软件和应用软件
                    参考答案：A

                    2. 汇编语言属于（  ）
                    A）用户软件
                    B）系统软件
                    C）高级语言
                    D）低级语言
                    参考答案：D

                    3.汇编语言源程序经汇编程序汇编后产生的文件的扩展名是（    ）。
                    A）EXE
                    B）OBJ
                    C）ASM
                    D）LST
                    参考答案：B
                </textarea>
                <div class="import-actions">
                    <button class="btn btn-primary" id="btnImport">🚀 解析并导入</button>
                    <button class="btn btn-outline btn-sm" id="btnLoadDemo">📂 加载示例</button>
                    <span style="font-size:14px;color:#64748b;" id="importStatus">就绪</span>
                </div>
                <div style="font-size:13px;color:#94a3b8;margin-top:4px;">
                    解析结果：选择题 <strong id="parsedChoiceCount">0</strong> 道，判断题 <strong id="parsedJudgeCount">0</strong> 道
                </div>
                <div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:8px;">
                    <button class="btn btn-outline btn-sm" id="btnExportData">💾 导出数据(JSON)</button>
                    <button class="btn btn-outline btn-sm" id="btnImportData">📂 导入数据(JSON)</button>
                    <button class="btn btn-outline btn-sm" id="btnImportTxt">📂 导入TXT文件</button>
                    <input type="file" id="fileInput" accept=".json" style="display:none">
                    <input type="file" id="txtFileInput" accept=".txt" style="display:none">
                    <button class="btn btn-danger btn-sm" id="btnClearAllData">🗑 清除所有数据</button>
                </div>
            </div>

            <!-- ===== 刷题面板 ===== -->
            <div class="quiz-panel" id="panelQuiz">
                <div class="progress-row">
                    <span id="progressText">0 / 0</span>
                    <div class="progress-bar"><div class="fill" id="progressFill"></div></div>
                    <div class="type-filter" id="typeFilter">
                        <button data-type="all" class="active">全部</button>
                        <button data-type="choice">选择题</button>
                        <button data-type="judge">判断题</button>
                    </div>
                    <div class="goto-container">
                        <span style="font-size:13px;color:#64748b;">跳转</span>
                        <input type="number" id="gotoInput" min="1" placeholder="题号">
                        <button class="goto-btn" id="gotoBtn">Go</button>
                    </div>
                </div>
                <div class="q-meta" id="qMeta">
                    <span class="tag" id="qTypeTag">选择</span>
                    <span class="tag" id="qStatusTag">未作答</span>
                </div>

                <div class="question-text" id="questionText">
                    <span class="qid" id="qidDisplay">#1</span>
                    <span id="qBody">题目加载中…</span>
                </div>

                <div id="optionsContainer"></div>

                <div class="answer-reveal" id="answerReveal">
                    <span>💡</span>
                    <span>正确答案：<span class="ans-text" id="ansText">—</span></span>
                    <span id="ansExtra" style="font-size:14px;color:#64748b;"></span>
                </div>

                <div class="actions">
                    <button class="btn btn-outline btn-sm" id="btnPrev">⬅ 上一题</button>
                    <button class="btn btn-outline btn-sm" id="btnNext">下一题 ➡</button>
                    <button class="btn btn-outline btn-sm" id="btnRandom">🎲 随机</button>
                    <span class="spacer"></span>
                    <button class="btn btn-outline btn-sm" id="btnToggleMode">🔀 随机</button>
                    <button class="btn btn-outline btn-sm" id="btnToggleFav">⭐ 收藏</button>
                    <button class="btn btn-outline btn-sm" id="btnShowAnswer">👁 显示答案</button>
                    <button class="btn btn-outline btn-sm" id="btnResetProgress">↺ 重置</button>
                </div>
                <div class="shortcuts-hint">
                    <span>快捷键：<kbd>←</kbd> <kbd>→</kbd> 切换</span>
                    <span><kbd>Space</kbd> 下一题</span>
                    <span><kbd>F</kbd> 收藏</span>
                    <span><kbd>A</kbd> 显示答案</span>
                    <span><kbd>R</kbd> 随机模式</span>
                </div>
            </div>

            <!-- ===== 统计面板 ===== -->
            <div class="stats-panel" id="panelStats">
                <div class="stats-grid" id="statsGrid">
                    <div class="stat-card"><div class="num blue" id="statTotal">0</div><div class="label">总题数</div></div>
                    <div class="stat-card"><div class="num" id="statDone">0</div><div class="label">已作答</div></div>
                    <div class="stat-card"><div class="num green" id="statRight">0</div><div class="label">正确</div></div>
                    <div class="stat-card"><div class="num red" id="statWrong">0</div><div class="label">错误</div></div>
                    <div class="stat-card"><div class="num gold" id="statAccuracy">0%</div><div class="label">正确率</div></div>
                    <div class="stat-card"><div class="num" id="statFav">0</div><div class="label">收藏</div></div>
                </div>

                <div class="detail-stats" id="detailStats">
                    <div class="item"><span>📘 选择题</span><span class="val" id="detailChoice">0/0 (0%)</span></div>
                    <div class="item"><span>📗 判断题</span><span class="val" id="detailJudge">0/0 (0%)</span></div>
                </div>

                <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:8px;">
                    <button class="btn btn-outline btn-sm" id="btnShowWrong">❌ 仅错题</button>
                    <button class="btn btn-outline btn-sm" id="btnShowFav">⭐ 仅收藏</button>
                    <button class="btn btn-outline btn-sm" id="btnShowAll">📋 全部</button>
                    <button class="btn btn-danger btn-sm" id="btnClearWrong">🗑 清空错题</button>
                </div>

                <div id="wrongListContainer">
                    <div class="empty-state" id="wrongEmpty">
                        <div class="icon">🎉</div>
                        <h3>暂无错题</h3>
                        <p>继续加油，保持全对！</p>
                    </div>
                    <div class="wrong-list" id="wrongList"></div>
                </div>
            </div>

        </div><!-- /main -->
    </div>

    <script>
        // ============================================================
        //  核心数据
        // ============================================================
        let allQuestions = [];
        let currentIndex = 0;
        let mode = 'order';
        let filter = 'all';
        let typeFilter = 'all';
        let showingAnswer = false;

        // DOM 引用
        const $ = id => document.getElementById(id);
        const $$ = sel => document.querySelectorAll(sel);

        const inputText = $('inputText');
        const btnImport = $('btnImport');
        const btnLoadDemo = $('btnLoadDemo');
        const importStatus = $('importStatus');
        const parsedChoiceCount = $('parsedChoiceCount');
        const parsedJudgeCount = $('parsedJudgeCount');

        const panelImport = $('panelImport');
        const panelQuiz = $('panelQuiz');
        const panelStats = $('panelStats');
        const tabBar = $('tabBar');
        const tabQuiz = $('tabQuiz');
        const quizBadge = $('quizBadge');

        const questionText = $('questionText');
        const qidDisplay = $('qidDisplay');
        const qBody = $('qBody');
        const optionsContainer = $('optionsContainer');
        const answerReveal = $('answerReveal');
        const ansText = $('ansText');
        const ansExtra = $('ansExtra');
        const progressText = $('progressText');
        const progressFill = $('progressFill');
        const qTypeTag = $('qTypeTag');
        const qStatusTag = $('qStatusTag');
        const typeFilterContainer = $('typeFilter');

        const btnPrev = $('btnPrev');
        const btnNext = $('btnNext');
        const btnRandom = $('btnRandom');
        const btnToggleMode = $('btnToggleMode');
        const btnToggleFav = $('btnToggleFav');
        const btnShowAnswer = $('btnShowAnswer');
        const btnResetProgress = $('btnResetProgress');

        const statTotal = $('statTotal');
        const statDone = $('statDone');
        const statRight = $('statRight');
        const statWrong = $('statWrong');
        const statAccuracy = $('statAccuracy');
        const statFav = $('statFav');
        const detailChoice = $('detailChoice');
        const detailJudge = $('detailJudge');
        const btnShowWrong = $('btnShowWrong');
        const btnShowFav = $('btnShowFav');
        const btnShowAll = $('btnShowAll');
        const btnClearWrong = $('btnClearWrong');
        const wrongList = $('wrongList');
        const wrongEmpty = $('wrongEmpty');

        const totalCount = $('totalCount');
        const doneCount = $('doneCount');
        const rightCount = $('rightCount');
        const wrongCount = $('wrongCount');

        const btnExportData = $('btnExportData');
        const btnImportData = $('btnImportData');
        const btnImportTxt = $('btnImportTxt');
        const fileInput = $('fileInput');
        const txtFileInput = $('txtFileInput');
        const btnClearAllData = $('btnClearAllData');

        // 跳转控件
        const gotoInput = $('gotoInput');
        const gotoBtn = $('gotoBtn');

        // ============================================================
        //  题库解析
        // ============================================================
        function parseQuestions(text) {
            const lines = text.split('\n').map(s => s.trim()).filter(s => s.length > 0);
            const questions = [];
            let i = 0;
            let idCounter = 1;

            while (i < lines.length) {
                const line = lines[i];
                const idMatch = line.match(/^(\d+)[\.、\))\s]+/);
                if (!idMatch) { i++; continue; }

                const qid = parseInt(idMatch[1]);
                let qText = line.replace(/^(\d+)[\.、\))\s]+/, '').trim();
                let j = i + 1;
                let opts = [];
                let isChoice = false;
                let answer = null;
                let rawAnswer = '';

                while (j < lines.length) {
                    const next = lines[j];
                    const optMatch = next.match(/^([A-Da-d]）?)\s*(.*)/);
                    if (optMatch && /^[A-Da-d]/.test(optMatch[1])) {
                        isChoice = true;
                        opts.push(optMatch[2].trim() || optMatch[1].trim());
                        j++;
                        continue;
                    }
                    const refMatch = next.match(/^参考答案[：:]\s*([A-Da-d]|正确|错误|对|错)/i);
                    if (refMatch) {
                        rawAnswer = refMatch[1].trim().toUpperCase();
                        if (rawAnswer === '正确' || rawAnswer === '对') answer = true;
                        else if (rawAnswer === '错误' || rawAnswer === '错') answer = false;
                        else if (/^[A-D]$/.test(rawAnswer)) {
                            const idx = rawAnswer.charCodeAt(0) - 65;
                            if (idx >= 0 && idx < 4) answer = idx;
                        }
                        j++;
                        break;
                    }
                    if (/^\d+[\.、\))\s]+/.test(next)) break;
                    qText += ' ' + next;
                    j++;
                }

                let k = j;
                while (k < lines.length && !/^\d+[\.、\))\s]+/.test(lines[k])) {
                    const refMatch2 = lines[k].match(/^参考答案[：:]\s*([A-Da-d]|正确|错误|对|错)/i);
                    if (refMatch2) {
                        rawAnswer = refMatch2[1].trim().toUpperCase();
                        if (rawAnswer === '正确' || rawAnswer === '对') answer = true;
                        else if (rawAnswer === '错误' || rawAnswer === '错') answer = false;
                        else if (/^[A-D]$/.test(rawAnswer)) {
                            const idx = rawAnswer.charCodeAt(0) - 65;
                            if (idx >= 0 && idx < 4) answer = idx;
                        }
                        j = k + 1;
                        break;
                    }
                    k++;
                }

                if (answer !== null || rawAnswer) {
                    const qObj = {
                        id: idCounter++,
                        rawId: qid,
                        q: qText.replace(/\s+/g, ' ').trim(),
                        type: isChoice ? 'choice' : 'judge',
                        opts: isChoice ? opts : [],
                        ans: answer,
                        rawAns: rawAnswer,
                        userAns: null,
                        fav: false,
                        correct: null,
                    };
                    questions.push(qObj);
                }
                i = j;
            }
            return questions;
        }

        // ============================================================
        //  数据管理
        // ============================================================
        function saveData() {
            try {
                const data = {
                    questions: allQuestions.map(q => ({
                        id: q.id,
                        rawId: q.rawId,
                        type: q.type,
                        q: q.q,
                        opts: q.opts,
                        ans: q.ans,
                        rawAns: q.rawAns,
                        userAns: q.userAns,
                        fav: q.fav,
                        correct: q.correct,
                    })),
                    currentIndex: currentIndex,
                    mode: mode,
                    filter: filter,
                    typeFilter: typeFilter,
                };
                localStorage.setItem('asm_quiz_data', JSON.stringify(data));
            } catch (e) { /* ignore */ }
        }

        function loadData() {
            try {
                const raw = localStorage.getItem('asm_quiz_data');
                if (!raw) return false;
                const data = JSON.parse(raw);
                if (data.questions && data.questions.length > 0) {
                    allQuestions = data.questions;
                    currentIndex = data.currentIndex || 0;
                    mode = data.mode || 'order';
                    filter = data.filter || 'all';
                    typeFilter = data.typeFilter || 'all';
                    return true;
                }
            } catch (e) { /* ignore */ }
            return false;
        }

        function resetProgress() {
            for (const q of allQuestions) {
                q.userAns = null;
                q.correct = null;
                q.fav = false;
            }
            currentIndex = 0;
            filter = 'all';
            typeFilter = 'all';
            saveData();
            renderAll();
        }

        function clearAllData() {
            if (confirm('⚠️ 确定要清除所有数据（包括题库和进度）吗？')) {
                localStorage.removeItem('asm_quiz_data');
                allQuestions = [];
                currentIndex = 0;
                filter = 'all';
                typeFilter = 'all';
                renderAll();
                switchTab('import');
                importStatus.textContent = '🗑 数据已清除';
                parsedChoiceCount.textContent = '0';
                parsedJudgeCount.textContent = '0';
            }
        }

        // ============================================================
        //  渲染引擎
        // ============================================================
        function getFilteredQuestions() {
            let list = allQuestions;
            if (typeFilter === 'choice') {
                list = list.filter(q => q.type === 'choice');
            } else if (typeFilter === 'judge') {
                list = list.filter(q => q.type === 'judge');
            }
            if (filter === 'wrong') {
                list = list.filter(q => q.correct === false);
            } else if (filter === 'fav') {
                list = list.filter(q => q.fav === true);
            }
            return list;
        }

        function getCurrentQuestion() {
            const list = getFilteredQuestions();
            if (list.length === 0) return null;
            if (currentIndex >= list.length) currentIndex = list.length - 1;
            if (currentIndex < 0) currentIndex = 0;
            return list[currentIndex];
        }

        function getFilteredIndex(question) {
            if (!question) return -1;
            const list = getFilteredQuestions();
            return list.findIndex(q => q.id === question.id);
        }

        function renderStats() {
            const total = allQuestions.length;
            const done = allQuestions.filter(q => q.userAns !== null).length;
            const right = allQuestions.filter(q => q.correct === true).length;
            const wrong = allQuestions.filter(q => q.correct === false).length;
            const fav = allQuestions.filter(q => q.fav === true).length;
            const acc = done === 0 ? 0 : Math.round((right / done) * 100);

            statTotal.textContent = total;
            statDone.textContent = done;
            statRight.textContent = right;
            statWrong.textContent = wrong;
            statAccuracy.textContent = acc + '%';
            statFav.textContent = fav;

            totalCount.textContent = total;
            doneCount.textContent = done;
            rightCount.textContent = right;
            wrongCount.textContent = wrong;
            quizBadge.textContent = total;

            // 按题型统计
            const choiceTotal = allQuestions.filter(q => q.type === 'choice').length;
            const choiceDone = allQuestions.filter(q => q.type === 'choice' && q.userAns !== null).length;
            const choiceRight = allQuestions.filter(q => q.type === 'choice' && q.correct === true).length;
            const choiceAcc = choiceDone === 0 ? 0 : Math.round((choiceRight / choiceDone) * 100);
            detailChoice.textContent = `${choiceRight}/${choiceDone} (${choiceAcc}%)`;

            const judgeTotal = allQuestions.filter(q => q.type === 'judge').length;
            const judgeDone = allQuestions.filter(q => q.type === 'judge' && q.userAns !== null).length;
            const judgeRight = allQuestions.filter(q => q.type === 'judge' && q.correct === true).length;
            const judgeAcc = judgeDone === 0 ? 0 : Math.round((judgeRight / judgeDone) * 100);
            detailJudge.textContent = `${judgeRight}/${judgeDone} (${judgeAcc}%)`;

            // 错题列表
            const wrongQs = allQuestions.filter(q => q.correct === false);
            if (wrongQs.length === 0) {
                wrongEmpty.style.display = 'block';
                wrongList.innerHTML = '';
            } else {
                wrongEmpty.style.display = 'none';
                wrongList.innerHTML = wrongQs.map(q => {
                    const ansStr = q.type === 'choice' ?
                        String.fromCharCode(65 + (typeof q.ans === 'number' ? q.ans : 0)) :
                        (q.ans ? '正确' : '错误');
                    return `<div class="wrong-item">
                                <span class="q">#${q.rawId || q.id} [${q.type === 'choice' ? '选择' : '判断'}] ${q.q.substring(0, 50)}${q.q.length > 50 ? '…' : ''}</span>
                                <span class="info">
                                    <span>✅ ${ansStr}</span>
                                    <span style="color:#dc2626;">你的答案: ${q.userAns !== null ? (q.type === 'choice' ? String.fromCharCode(65 + q.userAns) : (q.userAns ? '正确' : '错误')) : '未答'}</span>
                                    <button class="btn btn-outline btn-sm" data-jump="${q.id}">查看</button>
                                </span>
                            </div>`;
                }).join('');
                wrongList.querySelectorAll('[data-jump]').forEach(el => {
                    el.addEventListener('click', function() {
                        const id = parseInt(this.dataset.jump);
                        const idx = allQuestions.findIndex(q => q.id === id);
                        if (idx >= 0) {
                            filter = 'all';
                            typeFilter = 'all';
                            currentIndex = idx;
                            saveData();
                            renderAll();
                            switchTab('quiz');
                        }
                    });
                });
            }
        }

        function renderQuestion() {
            const q = getCurrentQuestion();
            const list = getFilteredQuestions();
            const total = list.length;

            typeFilterContainer.querySelectorAll('button').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.type === typeFilter);
            });

            if (!q || total === 0) {
                qidDisplay.textContent = '';
                qBody.textContent = '📭 当前筛选条件下没有题目，请调整筛选或导入题库。';
                qBody.className = 'empty-hint';
                optionsContainer.innerHTML = '';
                answerReveal.classList.remove('show', 'correct', 'wrong');
                progressText.textContent = '0 / 0';
                progressFill.style.width = '0%';
                qTypeTag.textContent = '—';
                qStatusTag.textContent = '无题';
                btnToggleFav.textContent = '☆ 收藏';
                btnToggleFav.style.borderColor = '';
                return;
            }
            qBody.className = '';

            const idx = getFilteredIndex(q);
            qidDisplay.textContent = `#${q.rawId || q.id}`;
            qBody.textContent = q.q;

            qTypeTag.textContent = q.type === 'choice' ? '选择题' : '判断题';
            qTypeTag.className = 'tag';

            if (q.correct === true) {
                qStatusTag.textContent = '✅ 正确';
                qStatusTag.className = 'tag correct';
            } else if (q.correct === false) {
                qStatusTag.textContent = '❌ 错误';
                qStatusTag.className = 'tag wrong';
            } else if (q.userAns !== null) {
                qStatusTag.textContent = '⏳ 已答';
                qStatusTag.className = 'tag';
            } else {
                qStatusTag.textContent = '⬜ 未答';
                qStatusTag.className = 'tag';
            }
            if (q.fav) {
                qStatusTag.textContent += ' ⭐';
                qStatusTag.className += ' fav';
            }

            progressText.textContent = `${idx + 1} / ${total}`;
            progressFill.style.width = `${((idx + 1) / total) * 100}%`;

            optionsContainer.innerHTML = '';
            if (q.type === 'choice') {
                const labels = ['A', 'B', 'C', 'D'];
                const container = document.createElement('div');
                container.className = 'options';
                q.opts.forEach((opt, i) => {
                    const div = document.createElement('div');
                    div.className = 'option';
                    if (q.userAns !== null && q.userAns === i) div.classList.add('selected');
                    if (showingAnswer) {
                        div.classList.add('disabled');
                        if (q.ans === i) div.classList.add('correct-reveal');
                        if (q.userAns !== null && q.userAns === i && q.ans !== i) div.classList.add('wrong-reveal');
                    }
                    div.innerHTML = `<span class="label">${labels[i]}.</span><span>${opt}</span>`;
                    div.dataset.idx = i;
                    if (!showingAnswer && q.userAns === null) {
                        div.addEventListener('click', function() {
                            selectChoice(q.id, parseInt(this.dataset.idx));
                        });
                    }
                    container.appendChild(div);
                });
                optionsContainer.appendChild(container);
            } else {
                const container = document.createElement('div');
                container.className = 'judge-options';
                ['正确', '错误'].forEach((label, i) => {
                    const val = i === 0;
                    const div = document.createElement('div');
                    div.className = 'option';
                    if (q.userAns !== null && q.userAns === val) div.classList.add('selected');
                    if (showingAnswer) {
                        div.classList.add('disabled');
                        if (q.ans === val) div.classList.add('correct-reveal');
                        if (q.userAns !== null && q.userAns === val && q.ans !== val) div.classList.add('wrong-reveal');
                    }
                    div.innerHTML = `<span class="label">${label}</span>`;
                    div.dataset.val = val;
                    if (!showingAnswer && q.userAns === null) {
                        div.addEventListener('click', function() {
                            selectJudge(q.id, this.dataset.val === 'true');
                        });
                    }
                    container.appendChild(div);
                });
                optionsContainer.appendChild(container);
            }

            if (showingAnswer && q.ans !== null) {
                let ansStr = '';
                if (q.type === 'choice') {
                    const idx = typeof q.ans === 'number' ? q.ans : 0;
                    ansStr = String.fromCharCode(65 + idx) + '. ' + (q.opts[idx] || '');
                } else {
                    ansStr = q.ans ? '正确' : '错误';
                }
                ansText.textContent = ansStr;
                const isCorrect = q.correct === true;
                answerReveal.className = 'answer-reveal show ' + (isCorrect ? 'correct' : 'wrong');
                ansExtra.textContent = isCorrect ? '🎉 回答正确！' : (q.userAns !== null ? '😅 再想想' : '');
            } else {
                answerReveal.classList.remove('show', 'correct', 'wrong');
            }

            btnToggleFav.textContent = q.fav ? '⭐ 已收藏' : '☆ 收藏';
            btnToggleFav.style.borderColor = q.fav ? '#facc15' : '';
        }

        function renderAll() {
            renderQuestion();
            renderStats();
            saveData();
        }

        // ============================================================
        //  交互逻辑
        // ============================================================
        function selectChoice(qid, idx) {
            const q = allQuestions.find(q => q.id === qid);
            if (!q || q.userAns !== null || showingAnswer) return;
            q.userAns = idx;
            q.correct = (q.ans === idx);
            saveData();
            renderAll();
            showingAnswer = true;
            renderQuestion();
        }

        function selectJudge(qid, val) {
            const q = allQuestions.find(q => q.id === qid);
            if (!q || q.userAns !== null || showingAnswer) return;
            q.userAns = val;
            q.correct = (q.ans === val);
            saveData();
            renderAll();
            showingAnswer = true;
            renderQuestion();
        }

        function nextQuestion() {
            const list = getFilteredQuestions();
            if (list.length === 0) return;
            if (currentIndex < list.length - 1) {
                currentIndex++;
            } else {
                currentIndex = 0;
            }
            showingAnswer = false;
            renderAll();
        }

        function prevQuestion() {
            const list = getFilteredQuestions();
            if (list.length === 0) return;
            if (currentIndex > 0) {
                currentIndex--;
            } else {
                currentIndex = list.length - 1;
            }
            showingAnswer = false;
            renderAll();
        }

        function randomQuestion() {
            const list = getFilteredQuestions();
            if (list.length === 0) return;
            const newIdx = Math.floor(Math.random() * list.length);
            currentIndex = newIdx;
            showingAnswer = false;
            renderAll();
        }

        function toggleMode() {
            mode = mode === 'order' ? 'random' : 'order';
            btnToggleMode.textContent = mode === 'order' ? '🔀 随机' : '📋 顺序';
            if (mode === 'random') {
                const list = getFilteredQuestions();
                if (list.length > 0) {
                    const q = getCurrentQuestion();
                    const idx = list.findIndex(item => item.id === q.id);
                    if (idx >= 0) {
                        shuffleArray(list);
                        currentIndex = list.findIndex(item => item.id === q.id);
                        if (currentIndex < 0) currentIndex = 0;
                    } else {
                        shuffleArray(list);
                        currentIndex = 0;
                    }
                }
            } else {
                const list = getFilteredQuestions();
                if (list.length > 0) {
                    const q = getCurrentQuestion();
                    if (q) {
                        currentIndex = list.findIndex(item => item.id === q.id);
                        if (currentIndex < 0) currentIndex = 0;
                    }
                }
            }
            saveData();
            renderAll();
        }

        function shuffleArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
        }

        function toggleFav() {
            const q = getCurrentQuestion();
            if (!q) return;
            q.fav = !q.fav;
            saveData();
            renderAll();
        }

        function toggleShowAnswer() {
            showingAnswer = !showingAnswer;
            renderAll();
        }

        // ===== 跳转题号功能 =====
        function gotoQuestion() {
            const val = parseInt(gotoInput.value);
            if (isNaN(val) || val < 1) {
                alert('请输入有效的题号（正整数）');
                return;
            }
            // 在全部题目中查找 rawId 匹配的题目
            const target = allQuestions.find(q => q.rawId === val);
            if (!target) {
                alert(`未找到题号为 ${val} 的题目`);
                return;
            }
            // 重置筛选为全部，并定位到该题
            filter = 'all';
            typeFilter = 'all';
            currentIndex = allQuestions.findIndex(q => q.id === target.id);
            if (currentIndex === -1) currentIndex = 0;
            showingAnswer = false;
            saveData();
            renderAll();
            switchTab('quiz');
            gotoInput.value = ''; // 清空输入
        }

        // ============================================================
        //  标签切换
        // ============================================================
        function switchTab(tab) {
            document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
            document.querySelector(`.tabs button[data-tab="${tab}"]`)?.classList.add('active');

            panelImport.style.display = tab === 'import' ? 'flex' : 'none';
            panelQuiz.style.display = tab === 'quiz' ? 'flex' : 'none';
            panelStats.style.display = tab === 'stats' ? 'flex' : 'none';
            if (tab === 'stats') renderStats();
            if (tab === 'quiz') renderQuestion();
        }

        // ============================================================
        //  导入/导出数据
        // ============================================================
        function exportData() {
            if (allQuestions.length === 0) {
                alert('没有数据可导出');
                return;
            }
            const data = {
                version: '1.0',
                timestamp: new Date().toISOString(),
                questions: allQuestions.map(q => ({
                    rawId: q.rawId,
                    type: q.type,
                    q: q.q,
                    opts: q.opts,
                    ans: q.ans,
                    rawAns: q.rawAns,
                    userAns: q.userAns,
                    fav: q.fav,
                    correct: q.correct,
                })),
                currentIndex: currentIndex,
                mode: mode,
                filter: filter,
                typeFilter: typeFilter,
            };
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `汇编刷题数据_${new Date().toLocaleDateString()}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }

        function importData(file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    if (!data.questions || !Array.isArray(data.questions)) {
                        alert('无效的数据格式');
                        return;
                    }
                    allQuestions = data.questions.map(q => ({
                        id: Math.random().toString(36).substr(2, 6),
                        rawId: q.rawId || 0,
                        type: q.type || 'choice',
                        q: q.q || '',
                        opts: q.opts || [],
                        ans: q.ans,
                        rawAns: q.rawAns || '',
                        userAns: q.userAns !== undefined ? q.userAns : null,
                        fav: q.fav || false,
                        correct: q.correct !== undefined ? q.correct : null,
                    }));
                    allQuestions.forEach((q, idx) => q.id = idx + 1);
                    currentIndex = data.currentIndex || 0;
                    mode = data.mode || 'order';
                    filter = data.filter || 'all';
                    typeFilter = data.typeFilter || 'all';
                    saveData();
                    renderAll();
                    switchTab('quiz');
                    importStatus.textContent = `✅ 成功导入 ${allQuestions.length} 道题 (JSON)`;
                    const choiceCount = allQuestions.filter(q => q.type === 'choice').length;
                    const judgeCount = allQuestions.filter(q => q.type === 'judge').length;
                    parsedChoiceCount.textContent = choiceCount;
                    parsedJudgeCount.textContent = judgeCount;
                } catch (err) {
                    alert('解析JSON失败: ' + err.message);
                }
            };
            reader.readAsText(file);
        }

        function importTxtFile(file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const text = e.target.result;
                if (!text.trim()) {
                    importStatus.textContent = '⚠️ TXT文件为空';
                    return;
                }
                importFromText(text);
            };
            reader.onerror = function() {
                importStatus.textContent = '❌ 读取文件失败';
            };
            reader.readAsText(file, 'UTF-8');
        }

        // ============================================================
        //  导入功能（文本）
        // ============================================================
        function importFromText(text) {
            const qs = parseQuestions(text);
            if (qs.length === 0) {
                importStatus.textContent = '⚠️ 未解析到有效题目，请检查格式（需包含参考答案）';
                return false;
            }
            allQuestions = qs;
            currentIndex = 0;
            mode = 'order';
            filter = 'all';
            typeFilter = 'all';
            showingAnswer = false;
            const choiceCount = qs.filter(q => q.type === 'choice').length;
            const judgeCount = qs.filter(q => q.type === 'judge').length;
            parsedChoiceCount.textContent = choiceCount;
            parsedJudgeCount.textContent = judgeCount;
            importStatus.textContent = `✅ 成功导入 ${qs.length} 道题 (选择 ${choiceCount}，判断 ${judgeCount})`;
            saveData();
            renderAll();
            switchTab('quiz');
            return true;
        }

        // ============================================================
        //  事件绑定
        // ============================================================
        tabBar.addEventListener('click', function(e) {
            const btn = e.target.closest('button');
            if (!btn) return;
            const tab = btn.dataset.tab;
            if (tab) switchTab(tab);
        });

        btnImport.addEventListener('click', function() {
            const text = inputText.value;
            if (!text.trim()) {
                importStatus.textContent = '⚠️ 请粘贴题目文本';
                return;
            }
            importFromText(text);
        });

        btnLoadDemo.addEventListener('click', function() {
            const demo = `1. 在下列的选项中，能够组成计算机系统的是（  ）。
            A）硬件系统和软件系统
            B）CPU、存储器、输入/输出设备
            C）操作系统、各种语言
            D）系统软件和应用软件
            参考答案：A

            2. 汇编语言属于（  ）
            A）用户软件
            B）系统软件
            C）高级语言
            D）低级语言
            参考答案：D

            3.汇编语言源程序经汇编程序汇编后产生的文件的扩展名是（    ）。
            A）EXE
            B）OBJ
            C）ASM
            D）LST
            参考答案：B

            4.汇编语言的什么文件经链接（LINK）后产生可执行文件？（ ）
            A）EXE
            B）OBJ
            C）ASM
            D）LST
            参考答案：B

            5.中央处理器 CPU 是由（   ）组成的
            A）运算器
            B）控制器
            C）寄存器组
            D）前三者
            参考答案：D

            6. IBM PC 机的 DOS 是属于（ ）。
            A）用户软件
            B）系统软件
            C）系统硬件
            D）一种语言
            参考答案：B

            7. 汇编语言源程序是（ ）程序。
            A）不可直接执行的
            B）可直接执行的
            C）经汇编程序汇编后就可执行的
            D）经连接后就可直接执行的
            参考答案：A

            8. 8086 / 8088 CPU的寄存器组中，８位的寄存器共有（   ）个
            A）4
            B）6
            C）8
            D）10
            参考答案：C

            9. 8086 / 8088 CPU的寄存器组中，16 位的寄存器共有（   ）个。
            A）10
            B）12
            C）13
            D）14
            参考答案：D

            10. 8086 / 8088 CPU执行算术运算时 PSW 共有（   ）个标志位会受影响。
            A）4
            B）5
            C）6
            D）7
            参考答案：C

            判断题：
            1. BX 是累加器、DX 是计数器。
            参考答案：错误

            2. 假设存储器中从 7462H 单元开始的四个相邻字节单元中的内容依次是 32H，46H，52H，0FEH，则存放字数据 0FE52H 的字地址是 7465H。
            参考答案：错误

            3. MOV AX，[BP]的源操作数的物理地址为 16*(DS)+(BP)。
            参考答案：错误

            4. MOV 指令不影响标志位。
            参考答案：正确`;
            inputText.value = demo;
            importFromText(demo);
        });

        btnNext.addEventListener('click', nextQuestion);
        btnPrev.addEventListener('click', prevQuestion);
        btnRandom.addEventListener('click', randomQuestion);
        btnToggleMode.addEventListener('click', toggleMode);
        btnToggleFav.addEventListener('click', toggleFav);
        btnShowAnswer.addEventListener('click', toggleShowAnswer);

        btnResetProgress.addEventListener('click', function() {
            if (confirm('确定要重置所有进度（保留题库）吗？')) {
                resetProgress();
            }
        });

        btnShowWrong.addEventListener('click', function() {
            filter = 'wrong';
            currentIndex = 0;
            showingAnswer = false;
            saveData();
            renderAll();
            switchTab('quiz');
        });
        btnShowFav.addEventListener('click', function() {
            filter = 'fav';
            currentIndex = 0;
            showingAnswer = false;
            saveData();
            renderAll();
            switchTab('quiz');
        });
        btnShowAll.addEventListener('click', function() {
            filter = 'all';
            currentIndex = 0;
            showingAnswer = false;
            saveData();
            renderAll();
            switchTab('quiz');
        });
        btnClearWrong.addEventListener('click', function() {
            if (confirm('确定要清空所有错题记录吗？（题目本身不会被删除）')) {
                for (const q of allQuestions) {
                    if (q.correct === false) {
                        q.userAns = null;
                        q.correct = null;
                    }
                }
                saveData();
                renderAll();
                renderStats();
            }
        });

        typeFilterContainer.addEventListener('click', function(e) {
            const btn = e.target.closest('button');
            if (!btn) return;
            const type = btn.dataset.type;
            if (type === typeFilter) return;
            typeFilter = type;
            currentIndex = 0;
            showingAnswer = false;
            saveData();
            renderAll();
        });

        // 数据导入导出
        btnExportData.addEventListener('click', exportData);
        btnImportData.addEventListener('click', function() {
            fileInput.click();
        });
        fileInput.addEventListener('change', function(e) {
            if (this.files.length > 0) {
                importData(this.files[0]);
                this.value = '';
            }
        });

        btnImportTxt.addEventListener('click', function() {
            txtFileInput.click();
        });
        txtFileInput.addEventListener('change', function(e) {
            if (this.files.length > 0) {
                importTxtFile(this.files[0]);
                this.value = '';
            }
        });

        btnClearAllData.addEventListener('click', clearAllData);

        // 跳转功能
        gotoBtn.addEventListener('click', gotoQuestion);
        gotoInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                gotoQuestion();
            }
        });

        // 键盘快捷键
        document.addEventListener('keydown', function(e) {
            if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT') return;
            if (e.key === 'ArrowRight') {
                e.preventDefault();
                nextQuestion();
            } else if (e.key === 'ArrowLeft') {
                e.preventDefault();
                prevQuestion();
            } else if (e.key === ' ') {
                e.preventDefault();
                nextQuestion();
            } else if (e.key === 'f' || e.key === 'F') {
                e.preventDefault();
                toggleFav();
            } else if (e.key === 'a' || e.key === 'A') {
                e.preventDefault();
                toggleShowAnswer();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                toggleMode();
            }
        });

        // ============================================================
        //  初始化
        // ============================================================
        function init() {
            if (loadData() && allQuestions.length > 0) {
                renderAll();
                switchTab('quiz');
                importStatus.textContent = `💾 已加载 ${allQuestions.length} 道题 (本地缓存)`;
                const choiceCount = allQuestions.filter(q => q.type === 'choice').length;
                const judgeCount = allQuestions.filter(q => q.type === 'judge').length;
                parsedChoiceCount.textContent = choiceCount;
                parsedJudgeCount.textContent = judgeCount;
            } else {
                switchTab('import');
                const demo = `1. 在下列的选项中，能够组成计算机系统的是（  ）。
                A）硬件系统和软件系统
                B）CPU、存储器、输入/输出设备
                C）操作系统、各种语言
                D）系统软件和应用软件
                参考答案：A

                2. 汇编语言属于（  ）
                A）用户软件
                B）系统软件
                C）高级语言
                D）低级语言
                参考答案：D

                3.汇编语言源程序经汇编程序汇编后产生的文件的扩展名是（    ）。
                A）EXE
                B）OBJ
                C）ASM
                D）LST
                参考答案：B`;
                inputText.value = demo;
                importStatus.textContent = '📋 点击「解析并导入」开始刷题';
            }
        }

        init();
    </script>

</body>
